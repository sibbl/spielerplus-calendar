<!doctype html>
<html
  lang="en"
  data-root-url="__ROOT_URL__"
  data-default-start-mode="__DEFAULT_START_MODE__"
  data-selected-start-mode="__SELECTED_START_MODE__"
>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SpielerPlus Calendar</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ["Sora", "ui-sans-serif", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body
    class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(14,165,233,0.18),_transparent_35%),linear-gradient(180deg,_#f8fafc_0%,_#e2e8f0_100%)] text-slate-900"
  >
    <main class="mx-auto flex min-h-screen w-full max-w-6xl flex-col px-4 py-10 sm:px-6 lg:px-8">
      <section
        class="overflow-hidden rounded-[2rem] border border-white/70 bg-white/65 p-8 shadow-[0_30px_120px_rgba(15,23,42,0.12)] backdrop-blur"
      >
        <div class="grid gap-8 lg:grid-cols-[1.1fr_0.9fr]">
          <div>
            <p class="text-sm font-semibold uppercase tracking-[0.25em] text-sky-700">
              SpielerPlus Calendar
            </p>
            <h1
              class="mt-4 max-w-2xl text-4xl font-semibold tracking-tight text-slate-950 sm:text-5xl"
            >
              Build your feed.
            </h1>
            <div class="mt-6 flex flex-wrap gap-3 text-sm">
              <a
                href="__FULL_CALENDAR_URL__"
                class="inline-flex items-center rounded-full bg-slate-950 px-4 py-2 font-medium text-white transition hover:bg-slate-800"
              >
                Open full calendar
              </a>
            </div>
            <div
              class="mt-6 inline-flex rounded-full border border-slate-200 bg-white/80 p-1 shadow-sm"
            >
              <label
                class="inline-flex cursor-pointer items-center gap-2 rounded-full px-4 py-2 text-sm font-medium text-slate-700 transition hover:text-slate-950"
              >
                <input
                  type="radio"
                  name="start-mode"
                  value="start"
                  class="h-4 w-4 border-slate-300 text-sky-600 focus:ring-sky-500"
                />
                Beginn
              </label>
              <label
                class="inline-flex cursor-pointer items-center gap-2 rounded-full px-4 py-2 text-sm font-medium text-slate-700 transition hover:text-slate-950"
              >
                <input
                  type="radio"
                  name="start-mode"
                  value="meet"
                  class="h-4 w-4 border-slate-300 text-sky-600 focus:ring-sky-500"
                />
                Treff
              </label>
            </div>
          </div>
          <div
            class="rounded-[1.75rem] border border-sky-200/60 bg-slate-950 p-6 text-slate-50 shadow-[0_20px_70px_rgba(15,23,42,0.32)]"
          >
            <p class="text-xs uppercase tracking-[0.3em] text-sky-200">Generated URL</p>
            <code id="generated-url" class="mt-4 block break-all text-sm leading-7 text-sky-100"
              >__FULL_CALENDAR_URL__</code
            >
            <div class="mt-6 flex flex-wrap gap-3">
              <a
                id="subscribe-link"
                href="__FULL_CALENDAR_URL__"
                class="inline-flex items-center rounded-full bg-sky-400 px-4 py-2 font-medium text-slate-950 transition hover:bg-sky-300"
              >
                Open feed
              </a>
              <button
                id="copy-button"
                type="button"
                class="inline-flex items-center rounded-full border border-white/15 px-4 py-2 font-medium text-white/90 transition hover:border-white/30 hover:bg-white/5"
              >
                Copy URL
              </button>
            </div>
            <div class="mt-6 flex flex-wrap gap-2 text-sm">
              <a
                id="apple-link"
                href="__FULL_CALENDAR_WEBCAL_URL__"
                class="inline-flex items-center rounded-full border border-white/15 px-3 py-2 font-medium text-white/90 transition hover:border-white/30 hover:bg-white/5"
              >
                iPhone/iPad
              </a>
              <a
                id="android-link"
                href="__FULL_CALENDAR_GOOGLE_URL__"
                class="inline-flex items-center rounded-full border border-white/15 px-3 py-2 font-medium text-white/90 transition hover:border-white/30 hover:bg-white/5"
              >
                Android
              </a>
              <a
                id="google-link"
                href="__FULL_CALENDAR_GOOGLE_URL__"
                class="inline-flex items-center rounded-full border border-white/15 px-3 py-2 font-medium text-white/90 transition hover:border-white/30 hover:bg-white/5"
              >
                Google
              </a>
              <a
                id="outlook-link"
                href="__FULL_CALENDAR_WEBCAL_URL__"
                class="inline-flex items-center rounded-full border border-white/15 px-3 py-2 font-medium text-white/90 transition hover:border-white/30 hover:bg-white/5"
              >
                Outlook
              </a>
            </div>
            <p id="copy-status" class="mt-4 text-sm text-slate-400"></p>
          </div>
        </div>
      </section>

      <section class="mt-8">
        <div class="mb-4 flex items-center justify-between gap-4">
          <div>
            <h2 class="text-xl font-semibold text-slate-950">Filters</h2>
          </div>
        </div>
        <form id="filter-form" class="grid gap-4 md:grid-cols-2 xl:grid-cols-3">
          __FILTER_CARDS__
        </form>
      </section>
    </main>

    <script>
      const rootUrl = new URL(document.documentElement.dataset.rootUrl);
      const defaultStartMode = document.documentElement.dataset.defaultStartMode || "start";
      const selectedStartMode =
        document.documentElement.dataset.selectedStartMode || defaultStartMode;
      const basePath = rootUrl.pathname === "/" ? "" : rootUrl.pathname.replace(/\/$/, "");
      const checkboxes = Array.from(document.querySelectorAll('input[name="filters"]'));
      const startModeInputs = Array.from(document.querySelectorAll('input[name="start-mode"]'));
      const urlEl = document.getElementById("generated-url");
      const linkEl = document.getElementById("subscribe-link");
      const appleLinkEl = document.getElementById("apple-link");
      const androidLinkEl = document.getElementById("android-link");
      const googleLinkEl = document.getElementById("google-link");
      const outlookLinkEl = document.getElementById("outlook-link");
      const copyButton = document.getElementById("copy-button");
      const copyStatus = document.getElementById("copy-status");

      function getSelectedStartMode() {
        const selectedInput = startModeInputs.find((input) => input.checked);
        return selectedInput ? selectedInput.value : defaultStartMode;
      }

      function buildFeedUrl(tokens, startMode) {
        const suffix = tokens.length ? "/" + tokens.join("+") + ".ics" : "/calendar.ics";
        const feedUrl = new URL(basePath + suffix, rootUrl.origin);
        if (startMode !== defaultStartMode) {
          feedUrl.searchParams.set("start", startMode);
        }
        return feedUrl.toString();
      }

      function buildWebcalUrl(url) {
        return url.replace(/^https?:\/\//, "webcal://");
      }

      function buildGoogleCalendarUrl(url) {
        return (
          "https://www.google.com/calendar/render?cid=" + encodeURIComponent(buildWebcalUrl(url))
        );
      }

      function updateGeneratedUrl() {
        const selectedTokens = checkboxes
          .filter((checkbox) => checkbox.checked)
          .map((checkbox) => checkbox.value);
        const selectedStartMode = getSelectedStartMode();
        const nextUrl = buildFeedUrl(selectedTokens, selectedStartMode);
        const nextWebcalUrl = buildWebcalUrl(nextUrl);
        const nextGoogleUrl = buildGoogleCalendarUrl(nextUrl);
        urlEl.textContent = nextUrl;
        linkEl.href = nextUrl;
        appleLinkEl.href = nextWebcalUrl;
        androidLinkEl.href = nextGoogleUrl;
        googleLinkEl.href = nextGoogleUrl;
        outlookLinkEl.href = nextWebcalUrl;
      }

      for (const checkbox of checkboxes) {
        checkbox.addEventListener("change", updateGeneratedUrl);
      }

      for (const input of startModeInputs) {
        input.checked = input.value === selectedStartMode;
        input.addEventListener("change", updateGeneratedUrl);
      }

      copyButton.addEventListener("click", async () => {
        try {
          await navigator.clipboard.writeText(urlEl.textContent || "");
          copyStatus.textContent = "Copied to clipboard.";
        } catch (_error) {
          copyStatus.textContent = "Clipboard access failed. Copy the URL manually.";
        }
      });

      updateGeneratedUrl();
    </script>
  </body>
</html>
